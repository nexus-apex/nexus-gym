{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} FitnessClass | NexusGym{% endblock %}
{% block page_title %}{% if editing %}Edit FitnessClass{% else %}New FitnessClass{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Instructor</label>
        <input type="text" name="instructor" value="{{ record.instructor|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Class Type</label>
        <select name="class_type">
          <option value="yoga" {% if record.class_type == 'yoga' %}selected{% endif %}>Yoga</option>
          <option value="crossfit" {% if record.class_type == 'crossfit' %}selected{% endif %}>CrossFit</option>
          <option value="zumba" {% if record.class_type == 'zumba' %}selected{% endif %}>Zumba</option>
          <option value="pilates" {% if record.class_type == 'pilates' %}selected{% endif %}>Pilates</option>
          <option value="hiit" {% if record.class_type == 'hiit' %}selected{% endif %}>HIIT</option>
          <option value="spin" {% if record.class_type == 'spin' %}selected{% endif %}>Spin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Schedule</label>
        <input type="text" name="schedule" value="{{ record.schedule|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Capacity</label>
        <input type="number" name="capacity" value="{{ record.capacity|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Enrolled</label>
        <input type="number" name="enrolled" value="{{ record.enrolled|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duration Mins</label>
        <input type="number" name="duration_mins" value="{{ record.duration_mins|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} FitnessClass</button>
      <a href="/fitnessclasses/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
