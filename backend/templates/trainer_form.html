{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Trainer | NexusGym{% endblock %}
{% block page_title %}{% if editing %}Edit Trainer{% else %}New Trainer{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
      <div class="form-group">
        <label>Specialization</label>
        <input type="text" name="specialization" value="{{ record.specialization|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Experience Years</label>
        <input type="number" name="experience_years" value="{{ record.experience_years|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Clients</label>
        <input type="number" name="clients" value="{{ record.clients|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rating</label>
        <input type="number" step="0.01" name="rating" value="{{ record.rating|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="on_leave" {% if record.status == 'on_leave' %}selected{% endif %}>On Leave</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Certification</label>
        <input type="text" name="certification" value="{{ record.certification|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Trainer</button>
      <a href="/trainers/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
